name: publish

# Publishes to PyPI when you push a version tag (e.g. v1.0.0) or cut a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo. One-time setup:
# on https://pypi.org add a "pending publisher" for project `uaregistry`, owner `uaregistry`,
# repo `python-sdk`, workflow `publish.yml`, environment `pypi`.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
